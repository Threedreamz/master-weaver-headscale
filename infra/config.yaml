# Headscale v0.23.0 configuration
# Reference: https://github.com/juanfont/headscale/blob/v0.23.0/config-example.yaml
# Phase 4 populates /etc/headscale/oidc-secret on the host

server_url: https://headscale.threedreamz.org
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9090
grpc_listen_addr: 127.0.0.1:50443

# gRPC TLS (disabled — Caddy handles TLS termination externally)
grpc_allow_insecure: true

# Private key for legacy WireGuard handshakes (Noise handles modern clients)
# NOTE: v0.23 has no top-level private_key_path — only noise.private_key_path below
noise:
  private_key_path: /var/lib/headscale/noise_private.key

prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

derp:
  server:
    enabled: false
    region_id: 999
    region_code: "headscale"
    region_name: "Headscale Embedded DERP"
    stun_listen_addr: "0.0.0.0:3478"
    private_key_path: /var/lib/headscale/derp_server_private.key
    automatically_add_embedded_derp_region: true
    ipv4: ""
    ipv6: ""
  # Use Tailscale's free global DERP fleet for v1 — avoids self-hosting DERP nodes
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  paths: []
  auto_update_enabled: true
  update_frequency: 24h

disable_check_updates: true
ephemeral_node_inactivity_timeout: 30m

database:
  type: sqlite3
  sqlite:
    path: /var/lib/headscale/db.sqlite3

acls_policy_path: ""

dns:
  magic_dns: true
  base_domain: ts.threedreamz.org
  nameservers:
    global:
      - 1.1.1.1
      - 1.0.0.1
    split: {}
  search_domains: []
  extra_records: []
  use_username_in_magic_dns: false
  # NOTE: dns.override_local_dns does NOT exist in v0.23 schema — omitted

oidc:
  only_start_if_oidc_is_available: true
  # CONFIRMED issuer: bare URL, no /oidc suffix (per pitfall 2026-04-28 [mwauth])
  issuer: https://auth.finderfinder.org
  client_id: headscale
  # Populated by Phase 4 provisioning (provision-hetzner-headscale.cjs)
  client_secret_path: /etc/headscale/oidc-secret
  use_expiry_from_token: false
  scope:
    - openid
    - email
    - profile
  # Defense-in-depth allowlist mirrors FinderAuth OIDC_OPERATOR_ALLOWED_EMAILS
  allowed_domains:
    - threedreamz.com
  allowed_users:
    - okokunze@gmail.com
    - oliver@kunze.pl
    - oli@kunze.pl
    - niklas@threedreamz.com
  strip_email_domain: false
  # NOTE: oidc.pkce does NOT exist in v0.23 schema — omitted

log:
  level: info
  format: text
